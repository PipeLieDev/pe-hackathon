global:
  scrape_interval: 15s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
  - static_configs:
    - targets:
      - alertmanager:9093

scrape_configs:
  - job_name: 'flask_app'
    static_configs:
      - targets: ['app:5000', 'app1:5000', 'app2:5000']

  - job_name: 'node'
    static_configs:
      - targets: ['node_exporter:9100']