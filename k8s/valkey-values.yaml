# Bitnami Valkey Helm chart values
# Docs: https://github.com/bitnami/charts/tree/main/bitnami/valkey

architecture: replication

auth:
  enabled: false  # no password — internal cluster only

sentinel:
  enabled: true
  replicas: 3
  resources:
    requests:
      memory: 32Mi
      cpu: 25m
    limits:
      memory: 64Mi
      cpu: 50m

master:
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 100m
  persistence:
    enabled: false  # cache-only, no need to persist

replica:
  replicaCount: 3
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 100m
  persistence:
    enabled: false
