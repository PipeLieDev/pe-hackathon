# Bitnami Valkey Helm chart values
# Docs: https://github.com/bitnami/charts/tree/main/bitnami/valkey

architecture: standalone

auth:
  enabled: false  # no password — internal cluster only

primary:
  nodeSelector:
    kubernetes.io/hostname: optiplexnode1
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 100m
  persistence:
    enabled: false  # cache-only, no need to persist
