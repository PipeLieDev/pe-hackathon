name: Deploy to K3s

on:
  workflow_run:
    workflows: ["Build & Push Docker Image"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (default: latest)'
        required: false
        default: 'latest'

jobs:
  deploy:
    runs-on: self-hosted
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE_NAME_LC=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Deploy to K3s
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            TAG="${{ github.event.workflow_run.head_sha }}"
          fi
          echo "Deploying ${{ env.IMAGE_NAME_LC }}:${TAG}"
          kubectl set image deployment/url-shortener \
            url-shortener=${{ env.IMAGE_NAME_LC }}:${TAG} \
            -n url-shortener
          kubectl rollout status deployment/url-shortener \
            -n url-shortener --timeout=120s

      - name: Verify deployment
        run: |
          kubectl get pods -n url-shortener -l app=url-shortener -o wide
