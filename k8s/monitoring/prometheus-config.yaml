apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    rule_files:
      - /etc/prometheus/rules/alert_rules.yml

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager-svc.monitoring.svc.cluster.local:9093

    scrape_configs:
      - job_name: 'flask_app'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - url-shortener
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            regex: url-shortener-svc
            action: keep
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            regex: http
            action: keep

      - job_name: 'k8s_app'
        static_configs:
          - targets: ['192.168.1.111:30090']
        metrics_path: /metrics
