server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki-svc.monitoring.svc.cluster.local:3100/loki/api/v1/push

scrape_configs:
  - job_name: flask_app
    static_configs:
      - targets:
          - localhost
        labels:
          job: flask_app
          __path__: /var/log/pods/url-shortener_url-shortener-*/*/*.log
    pipeline_stages:
      - cri: {}
      - json:
          expressions:
            level: level
            message: message
            timestamp: timestamp
      - labels:
          level:
