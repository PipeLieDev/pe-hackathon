server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: flask_app_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: flask_app
          __path__: /var/log/docker/containers/183f29380c73a3ba7aeff65020487f9bdd60525ea314758d5a925a040f8f8f60/183f29380c73a3ba7aeff65020487f9bdd60525ea314758d5a925a040f8f8f60-json.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
            timestamp: timestamp
      - labels:
          level:
          container_name: pe-hackathon-app-1