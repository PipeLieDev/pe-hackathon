global:
  scrape_interval: 15s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
  - static_configs:
    - targets:
      - alertmanager:9093

scrape_configs:
  - job_name: 'flask_app'
    static_configs:
      - targets: ['app:5000']
        labels:
          node: 'Node 1'
      - targets: ['app1:5000']
        labels:
          node: 'Node 2'
      - targets: ['app2:5000']
        labels:
          node: 'Node 3'

  - job_name: 'node'
    static_configs:
      - targets: ['node_exporter:9100']